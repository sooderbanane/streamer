services:
  gluetun:
    image: qmcgaw/gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY= # Add key here
      - SERVER_COUNTRIES=Switzerland
      - VPN_PORT_FORWARDING=on
    ports:
      - 9091:9091        # Transmission's UI now lives on gluetun's ports
      - 51413:51413
      - 51413:51413/udp
    networks: [homelab]


  transmission:
    image: lscr.io/linuxserver/transmission:latest
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on: [gluetun]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
      - USER= # user name 
      - PASS= # set password
    volumes:
      - transmission-config:/config
      - /srv:/data


volumes:
  transmission-config:

networks:
  homelab:
    external: true
