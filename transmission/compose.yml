services:
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    restart: unless-stopped
    environment:
      - PUID=1000                  # check with `id soba` — files land owned by you
      - PGID=1000
      - TZ=Europe/Zurich
      - USER=soba                  # web UI login
      - PASS=
    volumes:
      - transmission-config:/config
      - /srv/downloads:/downloads
    ports:
      - 9091:9091                  # web UI
      - 51413:51413                # peer port
      - 51413:51413/udp
    networks: [homelab]

volumes:
  transmission-config:

networks:
  homelab:
    external: true
